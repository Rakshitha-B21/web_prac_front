<!DOCTYPE html>
<html>
    <body>
        <h1>To-Do-List</h1>
        <input id="task" placeholder="NewTask">
        <button onclick="addTask()">Add</button>
        <ul id="list"></ul>
        <button onclick="clearAll()">Clear</button>
        <script>
            let tasks = [];
        
            function displayTasks(){
                let html="";
                for(let i=0;i<tasks.length;i++){
                    html+="<li>"+tasks[i]+" <button onclick='removeTasks("+i+")';>x</button></li>";

                }
                document.getElementById("list").innerHTML=html;
            }
            
            function addTask(){
                let taskInput=document.getElementById("task");
                let text=taskInput.value;
                if (text===""){
                    return;
                }
                tasks.push(text);
                taskInput.value="";
                saveTasks();
                displayTasks();
            }
            function removeTasks(i){
                tasks.splice(i, 1);
                saveTasks();
                displayTasks();
            }

            function clearAll(){
                tasks=[];
                saveTasks();
                displayTasks();
            }

            function saveTasks(){
                localStorage.setItem("tasks", JSON.stringify(tasks));
            }

            function loadTasks(){
                let saved=localStorage.getItem("tasks");
                if (saved !== null){
                    tasks=JSON.parse(saved);
                }
            }

            loadTasks();
            displayTasks();
        </script>

    </body>
</html>
